name: Example (dogfood)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "src/promptci/**"
      - "action.yml"
      - ".github/workflows/example.yml"

jobs:
  prompts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PromptCI on examples/
        uses: ./
        with:
          path: examples/
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
